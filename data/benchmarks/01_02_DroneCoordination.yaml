name: MultiDisksComparison

scenarios:
  Scenario1:
    name: MultiDisks
    filename: scenarios/01_multirobots/02_DroneCoordination.yaml
    run_count: 10
    timeout: 180
    planners: [FibrationRrt-Decomposition, RRTConnect, LBTRRT, RRT, BFMT]

planner_settings:
  FibrationRrt:
    range: Inf
    goal_bias: 0.05
    path_restriction_sampling_bias: 0.5
    path_restriction_surrounding_sampling_bias: 0.0
    sampling_perturbation_bias: 0.0
    selector_function_type: exponential

ompl_benchmark_plotter:
  options: ["--only-success-graph", "-s"]
