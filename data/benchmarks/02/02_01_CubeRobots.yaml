name: CubeRobots

scenarios:
  Scenario1:
    name: CubeRobots
    filename: scenarios/02_multirobots_hard/01_CubeRobots_None.yaml
    run_count: 10
    timeout: 3600
    planners: [RRT, EST, LBTRRT, FMT]

  Scenario2:
    name: CubeRobots
    filename: scenarios/02_multirobots_hard/01_CubeRobots_Decomposition.yaml
    run_count: 10
    timeout: 3600
    planners: [FibrationRrt-Decomposition]

  Scenario3:
    name: CubeRobots
    filename: scenarios/02_multirobots_hard/01_CubeRobots_PrioritizationLargeToSmall.yaml
    run_count: 10
    timeout: 3600
    planners: [FibrationRrt-PrioritizationLargeToSmall]

  Scenario4:
    name: CubeRobots
    filename: scenarios/02_multirobots_hard/01_CubeRobots_PrioritizationSmallToLarge.yaml
    run_count: 10
    timeout: 3600
    planners: [FibrationRrt-PrioritizationSmallToLarge]

ompl_benchmark_plotter:
  options: ["--only-success-graph", "--title-name CubeRobots"]
