name: ReedsSheppCars

world:
  gravity: [0, 0, 0]
  coordinate_frame: True

obstacles:
  Obstacle0:
    name: Floor
    type: floor
    height: -0.255
    color: [0.99, 0.99, 0.99, 1.0]
    width: 10.0

  Obstacle1:
    name: Box
    type: box
    position: [-4.0, 2.5, 0.5]
    color: [0.2, 0.2, 0.2, 1.0]
    size: [4.0, 4.0, 1.0]

  Obstacle2:
    name: Box
    type: box
    position: [+4.0, 2.5, 0.5]
    color: [0.2, 0.2, 0.2, 1.0]
    size: [4.0, 4.0, 1.0]

robots:
  Robot0:
    name: MultiRobot
    robots: [Robot1, Robot2]
    root: True
    smooth_path: True
    hide: False

  Robot1:
    name: MobileCar
    color: [0.7, 0.5, 0.5, 1.0]
    smooth_path: False
    hide: False

  Robot2:
    name: MobileCar
    color: [0.5, 0.7, 0.5, 1.0]
    smooth_path: False
    hide: False

projections:

  Projection0:
    name: ProjectionMultiRobot
    parent: Robot0
    task_space: True
    children: [Robot1, Robot2]

problem:
  start:
    type: joint
    config: [-1.0, -1.0, 0.57, +1.0, +1.0, -0.57]

  goal:
    type: joint
    threshold: 0.5
    config: [+1.0, +1.0, -0.57, -1.0, -1.0, 0.57]
