    type: box
    position: [-5.0, -2.5, 1.25]
    color: [0.25, 0.25, 0.6, 1.0]
    size: [0.5, 0.5, 3.0]

  Obstacle2c:
    name: Box
    type: box
    position: [-2.5, -2.5, 1.25]
    color: [0.25, 0.25, 0.6, 1.0]
    size: [0.5, 0.5, 3.0]

