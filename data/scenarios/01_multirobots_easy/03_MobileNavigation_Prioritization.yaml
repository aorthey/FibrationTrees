  Obstacle0:
    name: Floor
    type: floor
    height: -0.25
    width: 14

  ########################################
  #First Row
  ########################################

  Obstacle1:
    name: Box
    type: box
    position: [-5.0, 0.0, 1.25]
    color: [0.25, 0.25, 0.6, 1.0]
    size: [0.5, 0.5, 3.0]

  Obstacle3:
    name: Box
    type: box
    position: [+0.0, 0.0, 1.25]
    color: [0.25, 0.25, 0.6, 1.0]
