name: MobileManipulators

world:

  gravity: [0, 0, 0]
  coordinate_frame: False

obstacles:

  Obstacle1:
    name: Floor
    type: floor
    height: -0.255
    width: 10.0

  Obstacle2:
    name: Box
    type: box
    position: [0.0, 0.0, 0.0]
    size: [0.3, 0.3, 0.5]

robots:

  Robot0:
    name: MultiRobot
    robots: [Robot1, Robot2, Robot3]
    root: True

  Robot1:
    name: MobileKukaRobotTaskSpace

  Robot2:
    name: MobileKukaRobotTaskSpace

  Robot3:
    name: MobileKukaRobotTaskSpace

  Robot4:
    name: SphereRobot
    lower_limits: [-1.5, -0.02, 0.48]
    upper_limits: [+1.5, +0.02, 0.52]
    hide: True

  Robot5:
    name: SphereRobot
    lower_limits: [-0.02, -1.5, 0.48]
    upper_limits: [+0.02, +1.5, 0.52]
    hide: True

  Robot6:
    name: SphereRobot
    lower_limits: [-1.5, -1.5, 0.48]
    upper_limits: [+1.5, +1.5, 0.52]
    hide: True

projections:

  Projection0:
    name: ProjectionMultiRobot
    parent: Robot0
    task_space: True
    children: [Robot1, Robot2, Robot3]

  Projection1:
    name: ProjectionTaskSpace
    connection: [Robot1, Robot4]

  Projection2:
    name: ProjectionTaskSpace
    connection: [Robot2, Robot5]

  Projection3:
    name: ProjectionTaskSpace
    connection: [Robot3, Robot6]

problem:

  start:

    type: task
    Robot4: 
      config: [-1.3, -0.0, 0.5]
      visualize: True
    Robot5: 
      config: [-0.0, -1.3, 0.5]
      visualize: True
    Robot6: 
      config: [+1.3, +1.3, 0.5]
      visualize: True

  goal:

    type: task
    threshold: 0.5
    Robot4: 
      config: [+1.3, -0.0, 0.5]
      threshold: 0.1
      visualize: True
    Robot5: 
      config: [+0.0, +1.3, 0.5]
      threshold: 0.1
      visualize: True
    Robot6: 
      config: [-1.3, -1.3, 0.5]
      threshold: 0.1
      visualize: True
