name: MultiRobotVerticalWall

world:
  gravity: [0, 0, 0]
  coordinate_frame: False

robots:
  Robot0:
    name: MultiRobot
    robots: [Robot1, Robot2]
    smooth_path: False
    show_path: True
    root: True

  Robot1:
    name: KukaRobotTaskSpace
    smooth_path: False
    show_path: False
    translation: [0, -0.15, 0]

  Robot2:
    name: KukaRobotTaskSpace
    smooth_path: False
    show_path: False
    translation: [0, 0.15, 0]

  Robot3:
    name: SphereRobot
    lower_limits: [0.38, -0.5, 0]
    upper_limits: [0.43, +0.5, 2]
    smooth_path: True
    show_path: False
    hide: True

  Robot4:
    name: SphereRobot
    lower_limits: [0.38, -0.5, 0]
    upper_limits: [0.43, +0.5, 2]
    smooth_path: True
    show_path: False
    hide: True

obstacles:
  Obstacle1:
    name: Floor
    type: floor

  Obstacle2:
    name: Box
    type: box
    position: [0.5, 0.0, 0.75]
    size: [0.16, 2.0, 1.5]

projections:
  Projection0:
    name: ProjectionMultiRobot
    task_space: True
    parent: Robot0
    children: [Robot1, Robot2]

  Projection1:
    name: ProjectionTaskSpace
    connection: [Robot1, Robot3]

  Projection2:
    name: ProjectionTaskSpace
    connection: [Robot2, Robot4]

problem:
  start:
    type: task
    Robot3: 
      config: [0.4, -0.2, 1.0]
      visualize: True
    Robot4: 
      config: [0.4, 0.0, 1.0]
      visualize: True

  goal:
    type: task
    threshold: 0.025
    Robot3:
      config: [0.4, +0.1, 0.7]
      visualize: True
    Robot4:
      config: [0.4, -0.2, 0.6]
      visualize: True
