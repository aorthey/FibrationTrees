name: Drones

world:
  gravity: [0, 0, 0]
  coordinate_frame: True

obstacles:

  Obstacle1:
    name: Hut
    type: urdf
    filename: objects/hut_05.urdf
    position: [0.0, 0.0, -1.0]

robots:

  RobotAll:
    name: MultiRobot
    robots: [RobotA, RobotB, RobotC]
    root: True
    smooth_path: True

  RobotA:
    name: Drone
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    smooth_path: False
  RobotAi:
    name: SphereRobot
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    radius: 0.17
    smooth_path: True
    hide: False

  RobotB:
    name: Drone
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    smooth_path: False
  RobotBi:
    name: SphereRobot
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    radius: 0.17
    smooth_path: True
    hide: False

  RobotC:
    name: Drone
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    smooth_path: False
  RobotCi:
    name: SphereRobot
    lower_limits: [-10.0, -10.0, -10.0]
    upper_limits: [+10.0, +10.0, +10.0]
    radius: 0.17
    smooth_path: True
    hide: False

projections:

  Projection0:
    name: ProjectionMultiRobot
    parent: RobotAll
    task_space: False
    children: [RobotA, RobotB, RobotC]

  ProjectionA:
    name: Projection_R3R2SO2_R3
    connection: [RobotA, RobotAi]
  ProjectionB:
    name: Projection_R3R2SO2_R3
    connection: [RobotB, RobotBi]
  ProjectionC:
    name: Projection_R3R2SO2_R3
    connection: [RobotC, RobotCi]

problem:
  start:
    type: task
    RobotAi: 
      config: [+1.0, +1.0, 0.0]
    RobotBi: 
      config: [+1.0, +0.5, 0.0]
    RobotCi: 
      config: [+1.0, -0.0, 0.0]

  goal:
    type: task
    threshold: 0.5
    RobotAi: 
      config: [+1.0, +1.0, +4.0]
    RobotBi: 
      config: [+1.0, +0.5, +4.0]
    RobotCi: 
      config: [+1.0, -0.0, +4.0]
