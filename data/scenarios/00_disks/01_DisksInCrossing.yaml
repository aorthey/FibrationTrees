name: DisksInCross
world:
  gravity: [0, 0, 0]
  coordinate_frame: True

obstacles:
  Obstacle0:
    name: Floor
    type: floor
    height: -0.15
    color: [0.9, 0.9, 0.9, 1.0]
    width: 20.0

  # === WEST corridor (left arm) ===
  # North wall - extends exactly to the center connection
  Obstacle1:
    name: WestNorth
    type: box
    position: [-6.9, 2.3, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [9.2, 0.6, 2.5]
  # South wall
  Obstacle2:
    name: WestSouth
    type: box
    position: [-6.9, -2.3, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [9.2, 0.6, 2.5]
  # West end wall - connects perfectly to both north and south walls
  Obstacle3:
    name: WestEnd
    type: box
    position: [-11.5, 0.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 5.2, 2.5]

  # === EAST corridor (right arm) ===
  # North wall
  Obstacle4:
    name: EastNorth
    type: box
    position: [6.9, 2.3, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [9.2, 0.6, 2.5]
  # South wall
  Obstacle5:
    name: EastSouth
    type: box
    position: [6.9, -2.3, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [9.2, 0.6, 2.5]
  # East end wall
  Obstacle6:
    name: EastEnd
    type: box
    position: [11.5, 0.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 5.2, 2.5]

  # === NORTH corridor (top arm) ===
  # West wall - extends exactly to the center connection
  Obstacle7:
    name: NorthWest
    type: box
    position: [-2.3, 6.9, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 9.2, 2.5]
  # East wall
  Obstacle8:
    name: NorthEast
    type: box
    position: [2.3, 6.9, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 9.2, 2.5]
  # North end wall - connects perfectly
  Obstacle9:
    name: NorthEnd
    type: box
    position: [0.0, 11.5, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [5.2, 0.6, 2.5]

  # === SOUTH corridor (bottom arm) ===
  # West wall
  Obstacle10:
    name: SouthWest
    type: box
    position: [-2.3, -6.9, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 9.2, 2.5]
  # East wall
  Obstacle11:
    name: SouthEast
    type: box
    position: [2.3, -6.9, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.6, 9.2, 2.5]
  # South end wall
  Obstacle12:
    name: SouthEnd
    type: box
    position: [0.0, -11.5, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [5.2, 0.6, 2.5]

robots:
  Robot0:
    name: MultiRobot
    robots: [Robot1, Robot2]
    root: True
    smooth_path: False

  Robot1:
    name: DiskRobot
    lower_limits: [-13.0, -13.0]
    upper_limits: [+13.0, +13.0]
    color: [0.7, 0.9, 0.7, 1.0]
    radius: 1.25
    hide: False

  Robot2:
    name: DiskRobot
    lower_limits: [-13.0, -13.0]
    upper_limits: [+13.0, +13.0]
    color: [0.9, 0.7, 0.7, 1.0]
    radius: 1.25
    hide: False

problem:
  start:
    type: joint
    config: [-8.0, 0.0, 0.0, 8.0]     # Robot1 left (west), Robot2 top (north)

  goal:
    type: joint
    config: [+8.0, 0.0, 0.0, -8.0]    # Robot1 right (east), Robot2 bottom (south)
    visualize: True

planner_settings:
  RRT:
    range: 1.0
    goal_bias: 0.1
  FibrationRrt:
    range: 1.0
    goal_bias: 0.1
