name: DisksInTee

world:
  gravity: [0, 0, 0]
  coordinate_frame: True

obstacles:

  Obstacle0:
    name: Floor
    type: floor
    height: -0.15
    color: [0.9, 0.9, 0.9, 1.0]
    width: 20.0
  Obstacle1:
    name: BottomWall
    type: box
    position: [0.0, -10.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [20.0, 0.5, 2.5]
  Obstacle2:
    name: TopWall
    type: box
    position: [0.0, +10.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [20.0, 0.5, 2.5]
  Obstacle3:
    name: RightWall
    type: box
    position: [+10.0, 0.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.5, 20.0, 2.5]
  Obstacle4:
    name: LeftWall
    type: box
    position: [-10.0, 0.0, 1.25]
    color: [0.35, 0.35, 0.35, 1.0]
    size: [0.5, 20.0, 2.5]

robots:
  Robot0:
    name: MultiRobot
    robots: [Robot1, Robot2, Robot3]
    root: True
    smooth_path: False
  Robot1:
    name: DiskRobot
    lower_limits: [-10.0, -10.0]
    upper_limits: [+10.0, +10.0]
    color: [0.7, 0.9, 0.7, 1.0]
    radius: 3.0
    hide: False
  Robot2:
    name: DiskRobot
    lower_limits: [-10.0, -10.0]
    upper_limits: [+10.0, +10.0]
    color: [0.9, 0.7, 0.7, 1.0]
    radius: 3.0
    hide: False
  Robot3:
    name: DiskRobot
    lower_limits: [-10.0, -10.0]
    upper_limits: [+10.0, +10.0]
    color: [0.7, 0.7, 0.9, 1.0]
    radius: 3.0
    hide: False

problem:
  start:
    type: joint
    config: [-5.0, -5.0, +0.0, +5.0, +5.0, -5.0]
  goal:
    type: joint
    show: true
    config: [+5.0, +5.0, +0.0, -5.0, -5.0, +5.0]

planner_settings:
  RRT:
    range: 1.0
    goal_bias: 0.1
  FibrationRrt:
    range: 1.0
    goal_bias: 0.1

