name: PathVelocityDecomposition

world:
  gravity: [0, 0, 0]
  coordinate_frame: False

obstacles:
  Obstacle0:
    name: Floor
    type: floor
    height: -0.255

  Obstacle1:
    name: Box
    type: box
    position: [-1.1, 0.0, 0.0]
    size: [0.3, 0.3, 0.8]

  Obstacle2:
    name: Box
    type: box
    position: [-0.0, 0.0, 0.0]
    size: [0.3, 0.3, 1.8]

  Obstacle3:
    name: Box
    type: box
    position: [+1.1, 0.0, 0.0]
    size: [0.3, 0.3, 0.8]

  Obstacle4:
    name: TimeBasedMobileKukaRobotTaskSpace
    type: robot
    start: [0.5, 1.0, -1.57, -0.5, 0.0, +0.57, +1, 2, 0.24, -0.21]
    time_start: 0.0
    goal: [-0.5, +1.0, +1.57, +0.5, 0.0, -0.57, +1, 2, 0.24, +0.21]
    time_goal: 20.0
    color: [0.8, 0.6, 0.6, 1.0]

  Obstacle5:
    name: TimeBasedMobileKukaRobotTaskSpace
    type: robot
    start: [-0.5, +1.0, +1.57, -0.5, 0.0, +0.57, +1, 2, 0.24, -0.21]
    time_start: 0.0
    goal: [-0.5, -1.0, +0.785, +0.5, 0.0, -0.57, +1, 2, 0.24, +0.21]
    time_goal: 20.0
    color: [0.8, 0.6, 0.6, 1.0]

  Obstacle5:
    name: TimeBasedMobileKukaRobotTaskSpace
    type: robot
    start: [0.5, -0.5, +1.57, -0.5, 0.0, +0.57, +1, 2, 0.24, -0.21]
    time_start: 0.0
    goal: [0.5, -1.5, +0.785, +0.5, 0.0, -0.57, +1, 2, 0.24, +0.21]
    time_goal: 20.0
    color: [0.8, 0.6, 0.6, 1.0]

robots:
  Robot1:
    name: TimeBasedMobileKukaRobotTaskSpaceWithDynamicalConstraints
    max_velocity: 1.0
    max_time: 20.0
    tcp_lower_limits: [-1.5, -1.5, 0.68]
    tcp_upper_limits: [+1.5, +1.5, 0.72]
    color: [0.7, 0.9, 0.7, 1.0]
    root: True

  Robot2:
    name: MobileKukaRobotTaskSpace
    tcp_lower_limits: [-1.5, -1.5, 0.68]
    tcp_upper_limits: [+1.5, +1.5, 0.72]
    color: [0.7, 0.9, 0.7, 1.0]
    hide: True

  Robot3:
    name: SphereRobot
    lower_limits: [-1.5, -1.5, 0.68]
    upper_limits: [+1.5, +1.5, 0.72]
    hide: True

projections:

  Projection0:
    name: Projection_TimeBased
    connection: [Robot1, Robot2]

  Projection1:
    name: ProjectionTaskSpace
    connection: [Robot2, Robot3]

problem:
  start:
    type: task
    time: 0
    Robot3: 
      config: [-1.0, -1.0, 0.7]
      visualize: True

  goal:
    type: time
    threshold: 0.5
    Robot3: 
      config: [+1.0, +1.0, 0.7]
      threshold: 0.1
      visualize: True
