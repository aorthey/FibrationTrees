name: Full_Scenario

world:
  gravity: [0, 0, 0]
  coordinate_frame: False

robots:
  Robot1:
    name: KukaRobotTaskSpace
    hide: False
    root: True

  Robot2:
    name: SphereRobot
    lower_limits: [0.39, -0.5, 0]
    upper_limits: [0.43, +0.5, 2]
    hide: True

obstacles:
  Obstacle1:
    name: Floor
    type: floor

  Obstacle2:
    name: Box
    type: box
    position: [0.5, 0.0, 0.75]
    size: [0.15, 2.0, 1.5]

projections:

  Projection1:
    name: ProjectionTaskSpace
    connection: [Robot1, Robot2]

problem:
  start:
    type: task
    Robot2:
      config: [0.4, 0.35, 0.95]
      visualize: True

  goal:
    type: task
    Robot2:
      config: [0.4, -0.25, 0.95]
      threshold: 0.025
      visualize: True
